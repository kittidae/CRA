<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CRA Data visualnality</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="/static/style.css">
</head>

<body>

<!-- 🌸 PROVINCE SELECT MODAL -->
<div id="modal" class="modal">
  <div class="modal-box">
    <h2>Select Province</h2>

    <select id="province">
      <option value="Udon Thani">Udon Thani</option>
      <option value="Chiang Mai">Chiang Mai</option>
      <option value="Bangkok">Bangkok</option>
      <option value="Khon Kaen">Khon Kaen</option>
    </select>

    <button onclick="start()">Enter Dashboard</button>
  </div>
</div>

<!-- 🌾 MAIN DASHBOARD -->
<div id="dashboard" class="hidden">

  <header>
    <h1>CRA Data Dashboard</h1>
    <p id="subtitle">Live Agricultural Monitoring System</p>
  </header>

  <!-- 🟢 TOP GRID -->
  <div class="grid">

    <!-- 📈 PRICE -->
    <div class="card">
      <h3>Price Trend (Live)</h3>

      <select id="cropSelect" onchange="loadData()">
        <option value="rice">Rice</option>
        <option value="corn">Corn</option>
        <option value="mango">Mango</option>
        <option value="cassava">Cassava</option>
      </select>

      <canvas id="priceChart"></canvas>

      <div class="log" id="priceLog">
        Loading price data...
      </div>
    </div>

    <!-- 🌦 WEATHER -->
    <div class="card">
      <h3>Weather Analysis</h3>

      <canvas id="weatherChart"></canvas>

      <div class="log" id="weatherLog">
        Loading weather data...
      </div>
    </div>

  </div>

  <!-- 🟣 BOTTOM GRID -->
  <div class="grid">

    <!-- 💧 WATER -->
    <div class="card">
      <h3>Reservoir Level</h3>

      <canvas id="waterChart"></canvas>

      <div class="log" id="waterLog">
        Loading water data...
      </div>
    </div>

    <!-- 📰 NEWS -->
    <div class="card">
      <h3>Agricultural News (<span id="provName"></span>)</h3>

      <div id="newsBox" class="news-box">
        Loading news...
      </div>
    </div>

  </div>

</div>

<script src="/static/app.js"></script>

</body>
</html>
