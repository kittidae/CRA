<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CRA Data Visualization</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="/static/style.css">
</head>

<body>

  <div class="dashboard-wrapper">
    
    <header class="dashboard-header">

      <h1>CRA Data Visualization</h1>
      <p class="subtitle">Real-time crop monitoring and AI insights</p>
    </header>

    <main class="dashboard-grid">
      
      <section class="card risk-card green">
        <div class="card-header">
          <span class="icon">⚠</span>
          <h2>Risk Score</h2>
        </div>
        <p id="risk" class="data-value">Loading...</p>
      </section>

      <section class="card weather-card">
        <div class="card-header">
          <span class="icon"></span>
          <h2>Weather</h2>
        </div>
        <p id="weather" class="data-value">Loading...</p>
      </section>

      <section class="card alerts-card highlight">
        <div class="card-header">
          <span class="icon"></span>
          <h2>Alerts</h2>
        </div>
        <div id="alerts" class="data-content">Loading...</div>
      </section>

      <section class="card advice-card">
        <div class="card-header">
          <span class="icon"></span>
          <h2>AI Advice</h2>
        </div>
        <p id="advice" class="data-content">Loading...</p>
      </section>

    </main>

  </div>

  <script src="/static/app.js"></script>

</body>
</html>
