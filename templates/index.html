<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CRA Data Board — Live Agricultural Monitor</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&family=IBM+Plex+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div id="modal" class="modal">
  <div class="modal-box">
    <span class="modal-eyebrow">CRA &middot; Data Board</span>
    <h2>เลือกที่อยู่จังหวัดของคุณ</h2>
    <p class="modal-sub">เลือกภูมิภาคเพื่อโหลดข้อมูลเกษตรแบบ Real time</p>

    <label class="field-label" for="province">Province</label>
    <select id="province">
      <option value="Udon Thani">Udon Thani — อุดรธานี</option>
      <option value="Chiang Mai">Chiang Mai — เชียงใหม่</option>
      <option value="Bangkok">Bangkok — กรุงเทพมหานคร</option>
      <option value="Khon Kaen">Khon Kaen — ขอนแก่น</option>
      <option value="Kalasin">Kalasin — กาฬสินธุ์</option>
      <option value="Maha Sarakham">Maha Sarakham — มหาสารคาม</option>
      <option value="Roi Et">Roi Et — ร้อยเอ็ด</option>
      <option value="Nakhon Ratchasima">Nakhon Ratchasima — นครราชสีมา</option>
      <option value="Buriram">Buriram — บุรีรัมย์</option>
      <option value="Surin">Surin — สุรินทร์</option>
      <option value="Chonburi">Chonburi — ชลบุรี</option>
      <option value="Phuket">Phuket — ภูเก็ต</option>
    </select>

    <button id="enterBtn" onclick="start()">เข้าสู่หน้า Dash board</button>
  </div>
</div>

<div id="dashboard" class="hidden">

  <header class="board">
    <div class="board-top">
      <div class="board-mark">
        <div>
          <h1>CRA</h1>
          <p class="board-tagline">ระบบติดตามข่าวสารทางการเกษตร</p>
        </div>
      </div>
      <button class="change-province" onclick="openModal()">
        <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 21c-4-4.5-7-8.2-7-11.5A7 7 0 0 1 19 9.5C19 12.8 16 16.5 12 21z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/><circle cx="12" cy="9.5" r="2.3" fill="none" stroke="currentColor" stroke-width="1.8"/></svg>
        Change province
      </button>
    </div>

    <div class="ticker">
      <span class="ticker-chip ticker-chip--live">
        <span class="dot" aria-hidden="true"></span>LIVE
      </span>
      <span class="ticker-sep" aria-hidden="true"></span>
      <span class="ticker-chip">
        <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 21c-4-4.5-7-8.2-7-11.5A7 7 0 0 1 19 9.5C19 12.8 16 16.5 12 21z" fill="none" stroke="currentColor" stroke-width="
